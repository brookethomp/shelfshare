<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top">
        <script src="header.js"></script>
    </div>
    <div class="blank-space"></div>
    <div class="profile-container">
        <h1>Your Profile</h1>
        <img id="profileImage" src="default-profile.jpg" alt="Profile Image" style="width: 150px; height: 150px;">
        <p><strong>Name:</strong> <span id="profileName">Loading...</span></p>
        <p><strong>Bio:</strong> <span id="profileBio">Loading...</span></p>
        <p><strong>Favorite Genres:</strong> <span id="profileGenres">Loading...</span></p>
        <p><strong>Favorite Books:</strong> <span id="profileBooks">Loading...</span></p>
        <button onclick="window.location.href='edit-profile.html'">Edit Profile</button>
    </div>
    <div class="footer">
        <script src="footer.js"></script>
    </div>
    <script>
        async function loadProfile() {
            try {
                const response = await fetch('/profile', {
                    headers: { Authorization: `Bearer ${localStorage.getItem('token')}` }
                });
                const user = await response.json();
                document.getElementById('profileName').textContent = user.name || 'Name not set';
                document.getElementById('profileBio').textContent = user.bio || 'No bio available.';
                document.getElementById('profileGenres').textContent = user.genres?.join(', ') || 'No genres selected.';
                document.getElementById('profileBooks').textContent = user.favoriteBooks?.join(', ') || 'No favorite books listed.';
                document.getElementById('profileImage').src = user.profilePhoto || 'default-profile.jpg';
            } catch (err) {
                console.error('Error loading profile:', err);
            }
        }
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
